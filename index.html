<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✈️ Vliegtuig Detector</title>
</head>
<body>
  <h1>✈️ Vliegtuig Detector</h1>
  <p id="status">Locatie ophalen...</p>
  <ul id="flights"></ul>

  <script>
    let userLat, userLon;

    function showError(message) {
      document.getElementById("status").innerText = "❌ " + message;
    }

    navigator.geolocation.getCurrentPosition(
      pos => {
        userLat = pos.coords.latitude;
        userLon = pos.coords.longitude;
        document.getElementById("status").innerText = "📍 Locatie gevonden ✔";
        loadFlights();
      },
      err => {
        showError("Locatie kon niet worden opgehaald. Controleer je instellingen.");
      },
      {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 0
      }
    );

    function distance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = 
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    async function loadFlights() {
      try {
        document.getElementById("status").innerText = "✈️ Vliegtuigen laden...";

        // Proxy gebruiken om CORS te omzeilen
        const res = await fetch("https://api.allorigins.win/raw?url=https://opensky-network.org/api/states/all");
        const data = await res.json();

        const list = document.getElementById("flights");
        list.innerHTML = "";

        let found = false;

        data.states.forEach(flight => {
          const lat = flight[6];
          const lon = flight[5];
          const callsign = flight[1];
          const altitude = flight[7];

          if (lat && lon) {
            const dist = distance(userLat, userLon, lat, lon);

            if (dist < 10 && altitude > 3000) {
              found = true;

              const li = document.createElement("li");
              li.innerText = `${callsign || "Onbekend"} - ${Math.round(dist)} km - ${Math.round(altitude)} m`;
              list.appendChild(li);

              if (Notification.permission === "granted") {
                new Notification("✈️ Vliegtuig boven je!", {
                  body: `${callsign || "Onbekend"} - ${Math.round(altitude)} meter`
                });
              }
            }
          }
        });

        if (!found) {
          document.getElementById("status").innerText = "😴 Geen vliegtuigen dichtbij";
        } else {
          document.getElementById("status").innerText = "👀 Vliegtuig gevonden!";
        }

      } catch (e) {
        showError("Fout bij laden van vliegtuigen (proxy/API probleem)");
      }
    }

    if (Notification.permission !== "granted") {
      Notification.requestPermission();
    }

    setInterval(() => {
      if (userLat && userLon) {
        loadFlights();
      }
    }, 60000);
  </script>
</body>
</html>
